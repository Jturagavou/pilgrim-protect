version: "3.8"

services:
  # ── MongoDB ──
  mongo:
    image: mongo:7
    container_name: pilgrim-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  # ── Express API (port 5000) ──
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: pilgrim-api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017/pilgrim-protect
      - JWT_SECRET=pilgrim-protect-dev-secret-key-2026
      - JWT_EXPIRE=30d
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - mongo
    restart: unless-stopped

  # ── Next.js Website (port 3000) ──
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: pilgrim-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
      - NEXT_PUBLIC_MOCK=false
      - NEXT_PUBLIC_MAPBOX_TOKEN=${MAPBOX_TOKEN:-pk.placeholder}
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mongo-data:

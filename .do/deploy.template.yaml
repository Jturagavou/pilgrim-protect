# DigitalOcean App Platform — "Deploy to DO" button template.
# Replace REPO_URL with the forked repo when you click the button, then
# update any secrets in the DO dashboard after first deploy.
#
# Usage:
#   https://cloud.digitalocean.com/apps/new?repo=<REPO_URL>&refcode=pilgrim

name: pilgrim-protect
region: nyc

services:
  - name: api
    github:
      repo: REPO_URL
      branch: main
      deploy_on_push: true
    source_dir: /api
    build_command: npm ci --include=dev && npm run build
    run_command: node dist/server.js
    http_port: 8080
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: API_VERSION
        value: v1
      - key: LOG_LEVEL
        value: info
      - key: REQUIRE_MONGODB
        value: "true"
      - key: ALLOWED_ORIGINS
        value: ${_self.PUBLIC_URL}
      - key: MONGODB_URI
        value: ${db-mongodb-nyc3-29961.DATABASE_URL}
      - key: JWT_SECRET
        type: SECRET
      - key: JWT_EXPIRE
        value: 30d
      - key: CLOUDINARY_CLOUD_NAME
        type: SECRET
      - key: CLOUDINARY_API_KEY
        type: SECRET
      - key: CLOUDINARY_API_SECRET
        type: SECRET
      - key: BREVO_API_KEY
        type: SECRET
      - key: MAPBOX_TOKEN
        type: SECRET
      - key: SENTRY_DSN
        type: SECRET
    health_check:
      http_path: /health

  - name: web
    github:
      repo: REPO_URL
      branch: main
      deploy_on_push: true
    source_dir: /web
    build_command: npm ci --include=dev && npm run build
    run_command: npm start
    http_port: 3000
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: ${api.PUBLIC_URL}/api/v1
        scope: RUN_AND_BUILD_TIME
      - key: NEXT_PUBLIC_API_VERSION
        value: v1
      - key: NEXT_PUBLIC_MAPBOX_TOKEN
        type: SECRET
        scope: RUN_AND_BUILD_TIME
      - key: NEXTAUTH_URL
        value: ${_self.PUBLIC_URL}
      - key: NEXTAUTH_SECRET
        type: SECRET
      - key: CLOUDINARY_CLOUD_NAME
        value: pilgrim-protect
      - key: NEXT_PUBLIC_SENTRY_DSN
        type: SECRET

ingress:
  rules:
    # This Next.js route must hit the web service before the broader /api backend route.
    - component:
        name: web
        preserve_path_prefix: true
      match:
        path:
          prefix: /api/public/runtime-config
    - component:
        name: api
        preserve_path_prefix: true
      match:
        path:
          prefix: /api
    - component:
        name: web
      match:
        path:
          prefix: /

databases:
  - name: db-mongodb-nyc3-29961
    engine: MONGODB
    production: true
    cluster_name: db-mongodb-nyc3-29961

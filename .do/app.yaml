name: pilgrim-protect
region: nyc

services:
  - name: api
    github:
      repo: Jturagavou/pilgrim-protect
      branch: main
      deploy_on_push: true
    source_dir: /api
    build_command: npm ci && npm run build
    run_command: node dist/server.js
    http_port: 8080
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: API_VERSION
        value: v1
      - key: LOG_LEVEL
        value: info
      - key: ALLOWED_ORIGINS
        value: https://pilgrimprotectstory.org,https://www.pilgrimprotectstory.org
      - key: MONGODB_URI
        type: SECRET
      - key: JWT_SECRET
        type: SECRET
      - key: JWT_EXPIRE
        value: 30d
      - key: CLOUDINARY_CLOUD_NAME
        type: SECRET
      - key: CLOUDINARY_API_KEY
        type: SECRET
      - key: CLOUDINARY_API_SECRET
        type: SECRET
      - key: BREVO_API_KEY
        type: SECRET
      - key: MAPBOX_TOKEN
        type: SECRET
      - key: SENTRY_DSN
        type: SECRET
    health_check:
      http_path: /health

  - name: web
    github:
      repo: Jturagavou/pilgrim-protect
      branch: main
      deploy_on_push: true
    source_dir: /web
    build_command: npm ci && npm run build
    run_command: npm start
    http_port: 3000
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - key: NODE_ENV
        value: production
      # NEXT_PUBLIC_* is inlined at `next build` — must be present at build + run (DO default is often runtime-only).
      - key: NEXT_PUBLIC_API_URL
        value: ${api.PUBLIC_URL}/api/v1
        scope: RUN_AND_BUILD_TIME
      - key: NEXT_PUBLIC_API_VERSION
        value: v1
      - key: NEXT_PUBLIC_MAPBOX_TOKEN
        type: SECRET
        scope: RUN_AND_BUILD_TIME
      - key: NEXTAUTH_URL
        value: https://pilgrimprotectstory.org
      - key: NEXTAUTH_SECRET
        type: SECRET
      - key: CLOUDINARY_CLOUD_NAME
        value: pilgrim-protect
      - key: NEXT_PUBLIC_SENTRY_DSN
        type: SECRET
      - key: SENTRY_ORG
        type: SECRET
      - key: SENTRY_PROJECT
        type: SECRET
      - key: SENTRY_AUTH_TOKEN
        type: SECRET

domains:
  - domain: pilgrimprotectstory.org
    type: PRIMARY
  - domain: www.pilgrimprotectstory.org
    type: ALIAS
